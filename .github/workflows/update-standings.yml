name: Update IPL Standings

on:
  schedule:
    # Runs 3x daily at IST-friendly times: 8:30am / 1:30pm / 8:30pm IST
    # (UTC: 3:00 / 8:00 / 15:00)
    - cron: '0 3 * * *'
    - cron: '0 8 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch: # lets you trigger it manually from GitHub Actions tab

jobs:
  update-standings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update standings
        run: node scripts/update-standings.mjs

      - name: Commit if standings changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add src/data/teams.js
          if git diff --staged --quiet; then
            echo "No changes to standings — skipping commit"
          else
            git commit -m "chore: auto-update standings $(date -u +'%b %d, %Y %H:%M UTC')"
            git push
            echo "✅ Standings updated and pushed — Vercel will auto-deploy"
          fi
